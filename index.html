<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Jogo de EPIs - Gastronomia</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(120deg, #fff3e0, #ffe0b2);
        overflow-x: hidden;
    }

    #tela-inicial {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: url('https://images.unsplash.com/photo-1556911220-bff31c812dba') center/cover;
        color: white;
        text-align: center;
    }

    #tela-inicial h1 {
        font-size: 40px;
        text-shadow: 2px 2px 5px black;
    }

    button {
        padding: 15px 30px;
        font-size: 18px;
        border: none;
        cursor: pointer;
        background: #ff6f00;
        color: white;
        border-radius: 10px;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.05);
        background: #e65100;
    }

    #quiz-container {
        display: none;
        padding: 20px;
        max-width: 800px;
        margin: auto;
    }

    .card {
        background: white;
        padding: 20px;
        margin-top: 30px;
        border-radius: 15px;
        box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        animation: slideUp 0.4s ease;
    }

    .opcao {
        display: block;
        margin: 10px 0;
        padding: 12px;
        background: #fff3e0;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
        font-weight: bold;
    }

    .opcao:hover {
        background: #ffe0b2;
        transform: scale(1.02);
    }

    #feedback {
        margin-top: 15px;
        font-weight: bold;
    }

    .certo { color: green; }
    .errado { color: red; }

    @keyframes slideUp {
        from {transform: translateY(20px); opacity: 0;}
        to {transform: translateY(0); opacity: 1;}
    }
</style>
</head>

<body>

<div id="tela-inicial">
    <h1>Jogo de EPIs na Gastronomia</h1>
    <p>Segurança no ambiente de cozinha profissional</p>
    <button onclick="iniciarJogo()">Jogar</button>
</div>

<div id="quiz-container">
    <div class="card">
        <h2 id="pergunta"></h2>
        <div id="opcoes"></div>
        <div id="feedback"></div>
        <button onclick="proximaPergunta()" id="btn-proxima" style="display:none; margin-top:10px;">
            Próxima
        </button>
    </div>
</div>

<script>
const perguntas = [
    {
        pergunta: "Qual EPI evita queimaduras na cozinha?",
        correta: "Luvas térmicas",
        opcoes: ["Luvas térmicas", "Relógio", "Brincos", "Pulseira"]
    },
    {
        pergunta: "O que evita cortes ao usar facas?",
        correta: "Luvas de proteção",
        opcoes: ["Luvas de proteção", "Pano de prato", "Toalha", "Avental comum"]
    },
    {
        pergunta: "Qual a função do avental?",
        correta: "Proteger o corpo contra sujeira e calor",
        opcoes: ["Apenas estética", "Proteger o corpo contra sujeira e calor", "Decoração", "Identificação de chefe"]
    },
    {
        pergunta: "Qual atitude é correta no fogão?",
        correta: "Manter atenção total",
        opcoes: ["Usar celular", "Conversar distraído", "Manter atenção total", "Virar de costas"]
    },
    {
        pergunta: "Qual protege os pés na cozinha?",
        correta: "Sapato antiderrapante fechado",
        opcoes: ["Chinelo", "Sandália", "Sapato antiderrapante fechado", "Descalço"]
    },
    {
        pergunta: "Por que prender o cabelo?",
        correta: "Evitar contaminação e acidentes",
        opcoes: ["Moda", "Evitar contaminação e acidentes", "Não precisa", "Para ficar bonito"]
    },
    {
        pergunta: "O que fazer ao derramar óleo?",
        correta: "Limpar imediatamente",
        opcoes: ["Esperar secar", "Ignorar", "Limpar imediatamente", "Cobrir com pano e deixar"]
    },
    {
        pergunta: "Qual risco de não usar EPI?",
        correta: "Acidentes e contaminação",
        opcoes: ["Mais rapidez", "Acidentes e contaminação", "Nenhum risco", "Menos trabalho"]
    },
    {
        pergunta: "Objetivo da segurança do trabalho?",
        correta: "Prevenir acidentes",
        opcoes: ["Aumentar riscos", "Prevenir acidentes", "Reduzir higiene", "Aumentar bagunça"]
    },
    {
        pergunta: "O que evitar na cozinha?",
        correta: "Distrações e brincadeiras",
        opcoes: ["Organização", "Higiene", "Distrações e brincadeiras", "Trabalho em equipe"]
    }
];

let atual = 0;
let respostaCorreta = "";

function iniciarJogo() {
    document.getElementById("tela-inicial").style.display = "none";
    document.getElementById("quiz-container").style.display = "block";
    carregarPergunta();
}

function embaralhar(array) {
    return array.sort(() => Math.random() - 0.5);
}

function carregarPergunta() {
    let p = perguntas[atual];
    document.getElementById("pergunta").innerText = p.pergunta;

    let opcoes = embaralhar([...p.opcoes]);
    respostaCorreta = p.correta;

    let letras = ["A", "B", "C", "D"];
    let container = document.getElementById("opcoes");

    container.innerHTML = "";
    document.getElementById("feedback").innerHTML = "";
    document.getElementById("btn-proxima").style.display = "none";

    opcoes.forEach((opcao, index) => {
        let div = document.createElement("div");
        div.classList.add("opcao");
        div.innerText = letras[index] + ") " + opcao;

        div.onclick = () => verificarResposta(opcao);
        container.appendChild(div);
    });
}

function verificarResposta(resposta) {
    let feedback = document.getElementById("feedback");

    if(resposta === respostaCorreta) {
        feedback.innerHTML = "✔ Vocês acertaram!";
        feedback.className = "certo";
    } else {
        feedback.innerHTML = "✘ Vocês erraram! A resposta correta é: " + respostaCorreta;
        feedback.className = "errado";
    }

    document.getElementById("btn-proxima").style.display = "block";
}

function proximaPergunta() {
    atual++;

    if(atual < perguntas.length) {
        carregarPergunta();
    } else {
        document.getElementById("quiz-container").innerHTML =
        "<div class='card'><h2>Fim do jogo!</h2><p>Boa! Vocês aprenderam EPIs na gastronomia.</p></div>";
    }
}
</script>

</body>
</html>
