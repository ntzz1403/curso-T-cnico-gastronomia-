<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Quiz EPIs Gastronomia</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(160deg, #0f172a, #111827);
        color: #e5e7eb;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    .container {
        width: 90%;
        max-width: 750px;
        background: rgba(17,24,39,0.9);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 14px;
        padding: 28px;
        box-shadow: 0 0 35px rgba(0,0,0,0.6);
        animation: fadeIn 0.4s ease;
    }

    h1 {
        text-align: center;
        font-size: 22px;
        margin-bottom: 10px;
        color: #60a5fa;
    }

    h2 {
        text-align: center;
        font-size: 16px;
        font-weight: normal;
        opacity: 0.9;
    }

    button {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.1);
        background: rgba(255,255,255,0.05);
        color: #e5e7eb;
        cursor: pointer;
        transition: 0.25s;
        font-size: 15px;
    }

    button:hover {
        transform: scale(1.02);
        background: rgba(96,165,250,0.15);
        border-color: #60a5fa;
    }

    .start-btn {
        background: #60a5fa;
        color: #0f172a;
        font-weight: bold;
        border: none;
    }

    .start-btn:hover {
        background: #93c5fd;
    }

    .correct {
        background: rgba(34,197,94,0.25) !important;
        border-color: #22c55e !important;
    }

    .wrong {
        background: rgba(239,68,68,0.25) !important;
        border-color: #ef4444 !important;
    }

    .feedback {
        text-align: center;
        margin-top: 12px;
        font-size: 16px;
        color: #93c5fd;
        min-height: 20px;
    }

    .hidden { display: none; }

    @keyframes fadeIn {
        from {opacity: 0; transform: scale(0.98);}
        to {opacity: 1; transform: scale(1);}
    }
</style>
</head>

<body>

<div class="container">

    <!-- TELA INICIAL -->
    <div id="start-screen">
        <h1>Quiz – EPIs na Gastronomia</h1>
        <h2>Atividade em grupo sobre segurança na cozinha profissional</h2>
        <button class="start-btn" onclick="startGame()">Iniciar</button>
    </div>

    <!-- QUIZ -->
    <div id="quiz-screen" class="hidden">
        <h2 id="question"></h2>
        <div id="options"></div>
        <div id="feedback" class="feedback"></div>
    </div>

    <!-- FINAL -->
    <div id="end-screen" class="hidden">
        <h1>Resultado</h1>
        <p id="result" style="text-align:center;"></p>
        <button class="start-btn" onclick="location.reload()">Reiniciar</button>
    </div>

</div>

<script>

const questions = [
    {
        q: "Em uma cozinha profissional, qual EPI é indispensável ao lidar com óleo quente?",
        options: ["Luvas térmicas", "Pano de prato", "Luvas descartáveis", "Luvas de tecido fino"],
        correct: "Luvas térmicas"
    },
    {
        q: "Qual é a função da touca na cozinha?",
        options: ["Evitar cabelo nos alimentos", "Evitar calor", "Decoração", "Aumentar higiene das mãos"],
        correct: "Evitar cabelo nos alimentos"
    },
    {
        q: "Qual calçado é mais seguro em cozinha profissional?",
        options: ["Sapato antiderrapante", "Chinelo", "Sandália", "Tênis de tecido leve"],
        correct: "Sapato antiderrapante"
    },
    {
        q: "O que evita contaminação cruzada?",
        options: ["Trocar luvas corretamente", "Usar mesma tábua", "Não lavar mãos", "Misturar alimentos"],
        correct: "Trocar luvas corretamente"
    },
    {
        q: "Qual situação exige proteção ocular?",
        options: ["Fritura com óleo quente", "Corte de legumes", "Montagem de pratos", "Lavar louça"],
        correct: "Fritura com óleo quente"
    },
    {
        q: "Função do avental:",
        options: ["Proteger contra respingos", "Substituir luvas", "Evitar quedas", "Esquentar corpo"],
        correct: "Proteger contra respingos"
    },
    {
        q: "Uso correto de higiene:",
        options: ["Higienizar mãos sempre", "Usar anéis", "Usar pulseiras", "Não trocar luvas"],
        correct: "Higienizar mãos sempre"
    },
    {
        q: "Luvas descartáveis são usadas em:",
        options: ["Alimentos prontos", "Fritura intensa", "Forno", "Limpeza pesada"],
        correct: "Alimentos prontos"
    },
    {
        q: "Maior risco sem EPI:",
        options: ["Acidentes e contaminação", "Mais velocidade", "Melhor sabor", "Menos trabalho"],
        correct: "Acidentes e contaminação"
    },
    {
        q: "Atitude proibida na cozinha:",
        options: ["Usar acessórios pessoais", "Usar touca", "Usar uniforme limpo", "Higienizar mãos"],
        correct: "Usar acessórios pessoais"
    }
];

let current = 0;
let score = 0;

function startGame() {
    document.getElementById("start-screen").classList.add("hidden");
    document.getElementById("quiz-screen").classList.remove("hidden");
    showQuestion();
}

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function showQuestion() {
    const q = questions[current];
    document.getElementById("question").innerText = q.q;

    const optionsDiv = document.getElementById("options");
    const feedback = document.getElementById("feedback");

    feedback.innerText = "";
    optionsDiv.innerHTML = "";

    let shuffled = shuffle([...q.options]);

    shuffled.forEach(opt => {
        const btn = document.createElement("button");
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(opt, btn);
        optionsDiv.appendChild(btn);
    });
}

function checkAnswer(selected, btn) {
    const q = questions[current];
    const buttons = document.querySelectorAll("#options button");
    const feedback = document.getElementById("feedback");

    buttons.forEach(b => b.disabled = true);

    if (selected === q.correct) {
        btn.classList.add("correct");
        feedback.innerText = "✔ Correto!";
        score++;
    } else {
        btn.classList.add("wrong");

        buttons.forEach(b => {
            if (b.innerText === q.correct) {
                b.classList.add("correct");
            }
        });

        feedback.innerText = "❌ Vocês erraram! A resposta correta foi destacada.";
    }

    setTimeout(() => {
        current++;
        if (current < questions.length) {
            showQuestion();
        } else {
            document.getElementById("quiz-screen").classList.add("hidden");
            document.getElementById("end-screen").classList.remove("hidden");
            document.getElementById("result").innerText =
                `Acertos: ${score} de ${questions.length}`;
        }
    }, 1200);
}

</script>

</body>
    </html>
