<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Jogo EPIs - Gastronomia</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(120deg, #fff3e0, #ffe0b2);
    }

    /* TELA INICIAL */
    #tela-inicial {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        color: white;
        background: url("https://images.unsplash.com/photo-1556911220-bff31c812dba") center/cover;
    }

    #tela-inicial h1 {
        font-size: 42px;
        text-shadow: 2px 2px 6px black;
    }

    #tela-inicial p {
        text-shadow: 1px 1px 4px black;
    }

    button {
        margin-top: 20px;
        padding: 14px 28px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        background: #ff6f00;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.05);
        background: #e65100;
    }

    /* QUIZ */
    #quiz {
        display: none;
        max-width: 800px;
        margin: auto;
        padding: 20px;
    }

    .card {
        background: white;
        margin-top: 40px;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        animation: aparecer 0.4s ease;
    }

    h2 {
        margin-bottom: 20px;
    }

    .opcao {
        background: #fff3e0;
        padding: 12px;
        margin: 10px 0;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
        font-weight: bold;
    }

    .opcao:hover {
        background: #ffe0b2;
        transform: scale(1.02);
    }

    #feedback {
        margin-top: 15px;
        font-weight: bold;
    }

    .certo {
        color: green;
        animation: pulse 0.4s;
    }

    .errado {
        color: red;
        animation: shake 0.4s;
    }

    @keyframes aparecer {
        from {opacity: 0; transform: translateY(20px);}
        to {opacity: 1; transform: translateY(0);}
    }

    @keyframes pulse {
        0% {transform: scale(1);}
        50% {transform: scale(1.1);}
        100% {transform: scale(1);}
    }

    @keyframes shake {
        0% {transform: translateX(0);}
        25% {transform: translateX(-5px);}
        50% {transform: translateX(5px);}
        75% {transform: translateX(-5px);}
        100% {transform: translateX(0);}
    }
</style>
</head>

<body>

<!-- TELA INICIAL -->
<div id="tela-inicial">
    <h1>Jogo de EPIs na Gastronomia</h1>
    <p>Segurança no ambiente de cozinha profissional</p>
    <button onclick="iniciar()">Jogar</button>
</div>

<!-- QUIZ -->
<div id="quiz">
    <div class="card">
        <h2 id="pergunta"></h2>
        <div id="opcoes"></div>
        <div id="feedback"></div>
        <button id="proxima" style="display:none;" onclick="proxima()">Próxima</button>
    </div>
</div>

<script>
const perguntas = [
    {
        pergunta: "Qual EPI protege contra queimaduras na cozinha?",
        correta: "Luvas térmicas",
        opcoes: ["Luvas térmicas", "Relógio", "Brinco", "Pulseira"]
    },
    {
        pergunta: "O que evita cortes ao usar facas?",
        correta: "Luvas de proteção",
        opcoes: ["Luvas de proteção", "Pano de prato", "Toalha", "Guardanapo"]
    },
    {
        pergunta: "Qual a função do avental?",
        correta: "Proteger o corpo contra sujeira e calor",
        opcoes: ["Estética", "Proteger o corpo contra sujeira e calor", "Decoração", "Identificação de cargo"]
    },
    {
        pergunta: "Qual atitude correta no fogão?",
        correta: "Manter atenção total",
        opcoes: ["Usar celular", "Se distrair", "Conversar olhando para outro lado", "Manter atenção total"]
    },
    {
        pergunta: "Qual EPI protege os pés?",
        correta: "Sapato fechado antiderrapante",
        opcoes: ["Chinelo", "Sandália", "Descalço", "Sapato fechado antiderrapante"]
    },
    {
        pergunta: "Por que prender o cabelo na cozinha?",
        correta: "Evitar contaminação e acidentes",
        opcoes: ["Estilo", "Evitar contaminação e acidentes", "Não precisa", "Moda"]
    },
    {
        pergunta: "O que fazer ao derramar óleo no chão?",
        correta: "Limpar imediatamente",
        opcoes: ["Ignorar", "Esperar secar", "Cobrir e deixar", "Limpar imediatamente"]
    },
    {
        pergunta: "Qual risco de não usar EPI?",
        correta: "Acidentes e contaminação",
        opcoes: ["Mais rapidez", "Nenhum risco", "Acidentes e contaminação", "Menos trabalho"]
    },
    {
        pergunta: "Qual objetivo da segurança do trabalho?",
        correta: "Prevenir acidentes",
        opcoes: ["Aumentar riscos", "Prevenir acidentes", "Reduzir higiene", "Bagunçar o ambiente"]
    },
    {
        pergunta: "O que deve ser evitado na cozinha?",
        correta: "Distrações e brincadeiras",
        opcoes: ["Organização", "Higiene", "Trabalho em equipe", "Distrações e brincadeiras"]
    }
];

let atual = 0;
let corretaAtual = "";

function iniciar() {
    document.getElementById("tela-inicial").style.display = "none";
    document.getElementById("quiz").style.display = "block";
    carregar();
}

function embaralhar(array) {
    return array.sort(() => Math.random() - 0.5);
}

function carregar() {
    let q = perguntas[atual];
    corretaAtual = q.correta;

    document.getElementById("pergunta").innerText = q.pergunta;

    let opcoes = embaralhar([...q.opcoes]);
    let letras = ["A", "B", "C", "D"];

    let container = document.getElementById("opcoes");
    container.innerHTML = "";

    document.getElementById("feedback").innerHTML = "";
    document.getElementById("proxima").style.display = "none";

    opcoes.forEach((op, i) => {
        let div = document.createElement("div");
        div.className = "opcao";
        div.innerText = letras[i] + ") " + op;

        div.onclick = () => responder(op);
        container.appendChild(div);
    });
}

function responder(resposta) {
    let fb = document.getElementById("feedback");

    if(resposta === corretaAtual) {
        fb.innerHTML = "✔ Vocês acertaram!";
        fb.className = "certo";
    } else {
        fb.innerHTML = "✘ Vocês erraram! A resposta correta é: " + corretaAtual;
        fb.className = "errado";
    }

    document.getElementById("proxima").style.display = "block";
}

function proxima() {
    atual++;

    if(atual < perguntas.length) {
        carregar();
    } else {
        document.getElementById("quiz").innerHTML = `
            <div class="card">
                <h2>Fim do jogo!</h2>
                <p>Vocês concluíram o quiz sobre EPIs na gastronomia.</p>
            </div>
        `;
    }
}
</script>

</body>
</html>
