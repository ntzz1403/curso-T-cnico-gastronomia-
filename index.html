<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Quiz EPIs - Gastronomia</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: radial-gradient(circle at top, #1b1b1b, #000);
        color: #f5f5f5;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    /* brilho suave fundo */
    body::before {
        content: "";
        position: absolute;
        width: 350px;
        height: 350px;
        background: rgba(212,175,55,0.12);
        filter: blur(120px);
        top: -80px;
        left: -80px;
        animation: float 6s infinite alternate;
    }

    body::after {
        content: "";
        position: absolute;
        width: 400px;
        height: 400px;
        background: rgba(255,255,255,0.04);
        filter: blur(130px);
        bottom: -120px;
        right: -120px;
        animation: float2 7s infinite alternate;
    }

    @keyframes float {
        from { transform: translateY(0); }
        to { transform: translateY(40px); }
    }

    @keyframes float2 {
        from { transform: translateY(0); }
        to { transform: translateY(-40px); }
    }

    .container {
        position: relative;
        width: 90%;
        max-width: 750px;
        background: rgba(25,25,25,0.9);
        border: 1px solid rgba(212,175,55,0.25);
        border-radius: 16px;
        padding: 30px;
        box-shadow: 0 0 40px rgba(0,0,0,0.8);
        backdrop-filter: blur(10px);
        animation: fadeIn 0.5s ease;
    }

    h1 {
        text-align: center;
        color: #d4af37;
        margin-bottom: 10px;
        font-size: 24px;
    }

    h2 {
        text-align: center;
        font-size: 18px;
        font-weight: normal;
    }

    button {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        border-radius: 10px;
        border: 1px solid rgba(212,175,55,0.25);
        background: rgba(255,255,255,0.05);
        color: white;
        cursor: pointer;
        transition: 0.3s;
        font-size: 15px;
    }

    button:hover {
        transform: scale(1.02);
        border-color: #d4af37;
        background: rgba(212,175,55,0.1);
    }

    .start-btn {
        background: #d4af37;
        color: black;
        font-weight: bold;
    }

    .start-btn:hover {
        background: #f1c94c;
    }

    .correct {
        background: rgba(46,204,113,0.25) !important;
        border-color: #2ecc71 !important;
    }

    .wrong {
        background: rgba(231,76,60,0.25) !important;
        border-color: #e74c3c !important;
    }

    .feedback {
        text-align: center;
        margin-top: 15px;
        font-size: 16px;
        color: #d4af37;
        animation: pop 0.3s ease;
    }

    .hidden { display: none; }

    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.97); }
        to { opacity: 1; transform: scale(1); }
    }

    @keyframes pop {
        from { transform: scale(0.8); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }

</style>
</head>

<body>

<div class="container">

    <!-- TELA INICIAL -->
    <div id="start-screen">
        <h1>Quiz – EPIs na Gastronomia</h1>
        <h2>Atividade em grupo sobre segurança em cozinha profissional</h2>
        <button class="start-btn" onclick="startGame()">Começar</button>
    </div>

    <!-- QUIZ -->
    <div id="quiz-screen" class="hidden">
        <h2 id="question"></h2>
        <div id="options"></div>
        <div id="feedback" class="feedback"></div>
    </div>

    <!-- FINAL -->
    <div id="end-screen" class="hidden">
        <h1>Resultado Final</h1>
        <p id="result" style="text-align:center;"></p>
        <button class="start-btn" onclick="location.reload()">Jogar novamente</button>
    </div>

</div>

<script>

const questions = [
    {
        q: "Em uma cozinha profissional, qual EPI é indispensável ao lidar com óleo quente?",
        options: ["Luvas térmicas", "Luvas descartáveis", "Pano de prato", "Luvas de tecido fino"],
        correct: 0
    },
    {
        q: "Qual é a função principal da touca na cozinha?",
        options: ["Evitar contaminação por cabelo", "Evitar calor", "Padronizar uniforme", "Decoração"],
        correct: 0
    },
    {
        q: "Qual calçado é obrigatório em cozinha profissional?",
        options: ["Sapato antiderrapante", "Chinelo", "Sandália aberta", "Tênis de tecido leve"],
        correct: 0
    },
    {
        q: "Qual situação exige proteção ocular?",
        options: ["Fritura com óleo quente", "Corte de legumes frios", "Montagem de pratos", "Lavagem de louça"],
        correct: 0
    },
    {
        q: "O que evita contaminação cruzada?",
        options: ["Trocar luvas corretamente", "Usar a mesma tábua sempre", "Não lavar mãos", "Misturar alimentos crus e prontos"],
        correct: 0
    },
    {
        q: "Função do avental na cozinha:",
        options: ["Proteger contra respingos", "Substituir luvas", "Evitar quedas", "Decoração"],
        correct: 0
    },
    {
        q: "Qual prática é correta em cozinha profissional?",
        options: ["Higienizar mãos constantemente", "Usar anéis", "Usar pulseiras", "Não trocar luvas"],
        correct: 0
    },
    {
        q: "Luvas descartáveis são usadas principalmente para:",
        options: ["Alimentos prontos", "Limpeza do chão", "Forno quente", "Fritura intensa"],
        correct: 0
    },
    {
        q: "Maior risco da falta de EPIs:",
        options: ["Acidentes e contaminação", "Mais velocidade", "Melhor sabor", "Menos trabalho"],
        correct: 0
    },
    {
        q: "Qual atitude é proibida na cozinha profissional?",
        options: ["Usar acessórios pessoais", "Usar uniforme limpo", "Higienizar mãos", "Usar touca"],
        correct: 0
    }
];

let current = 0;
let score = 0;

function startGame() {
    document.getElementById("start-screen").classList.add("hidden");
    document.getElementById("quiz-screen").classList.remove("hidden");
    showQuestion();
}

function showQuestion() {
    const q = questions[current];
    document.getElementById("question").innerText = q.q;

    const optionsDiv = document.getElementById("options");
    const feedback = document.getElementById("feedback");

    feedback.innerText = "";
    optionsDiv.innerHTML = "";

    q.options.forEach((opt, index) => {
        const btn = document.createElement("button");
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(index, btn);
        optionsDiv.appendChild(btn);
    });
}

function checkAnswer(index, btn) {
    const q = questions[current];
    const buttons = document.querySelectorAll("#options button");
    const feedback = document.getElementById("feedback");

    buttons.forEach(b => b.disabled = true);

    if (index === q.correct) {
        btn.classList.add("correct");
        feedback.innerHTML = "✔ Correto!";
        score++;
    } else {
        btn.classList.add("wrong");
        buttons[q.correct].classList.add("correct");
        feedback.innerHTML = "❌ Vocês erraram! A resposta correta está destacada.";
    }

    setTimeout(() => {
        current++;
        if (current < questions.length) {
            showQuestion();
        } else {
            document.getElementById("quiz-screen").classList.add("hidden");
            document.getElementById("end-screen").classList.remove("hidden");
            document.getElementById("result").innerText =
                `Vocês acertaram ${score} de ${questions.length} perguntas.`;
        }
    }, 1400);
}

</script>

</body>
</html>
