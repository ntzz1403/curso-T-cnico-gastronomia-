<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Jogo de EPIs - Gastronomia</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(120deg, #fff3e0, #ffe0b2);
        overflow-x: hidden;
    }

    /* Tela inicial */
    #tela-inicial {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: url('https://images.unsplash.com/photo-1556911220-bff31c812dba') center/cover;
        color: white;
        text-align: center;
        animation: fadeIn 1.5s ease;
    }

    #tela-inicial h1 {
        font-size: 40px;
        text-shadow: 2px 2px 5px black;
    }

    button {
        padding: 15px 30px;
        font-size: 18px;
        border: none;
        cursor: pointer;
        background: #ff6f00;
        color: white;
        border-radius: 10px;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.05);
        background: #e65100;
    }

    /* Quiz */
    #quiz-container {
        display: none;
        padding: 20px;
        max-width: 800px;
        margin: auto;
    }

    .card {
        background: white;
        padding: 20px;
        margin-top: 30px;
        border-radius: 15px;
        box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        animation: slideUp 0.5s ease;
    }

    .opcao {
        display: block;
        margin: 10px 0;
        padding: 10px;
        background: #fff3e0;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
    }

    .opcao:hover {
        background: #ffe0b2;
    }

    #feedback {
        margin-top: 15px;
        font-weight: bold;
    }

    .certo {
        color: green;
        animation: pulse 0.5s;
    }

    .errado {
        color: red;
        animation: shake 0.4s;
    }

    @keyframes fadeIn {
        from {opacity: 0;}
        to {opacity: 1;}
    }

    @keyframes slideUp {
        from {transform: translateY(30px); opacity: 0;}
        to {transform: translateY(0); opacity: 1;}
    }

    @keyframes pulse {
        0% {transform: scale(1);}
        50% {transform: scale(1.1);}
        100% {transform: scale(1);}
    }

    @keyframes shake {
        0% {transform: translateX(0);}
        25% {transform: translateX(-5px);}
        50% {transform: translateX(5px);}
        75% {transform: translateX(-5px);}
        100% {transform: translateX(0);}
    }
</style>
</head>

<body>

<!-- TELA INICIAL -->
<div id="tela-inicial">
    <h1>Jogo de EPIs na Gastronomia</h1>
    <p>Segurança no trabalho dentro da cozinha</p>
    <button onclick="iniciarJogo()">Jogar</button>
</div>

<!-- QUIZ -->
<div id="quiz-container">
    <div class="card">
        <h2 id="pergunta"></h2>
        <div id="opcoes"></div>
        <div id="feedback"></div>
        <button onclick="proximaPergunta()" id="btn-proxima" style="display:none; margin-top:10px;">
            Próxima
        </button>
    </div>
</div>

<script>
const perguntas = [
    {
        pergunta: "Qual EPI é essencial para evitar queimaduras na cozinha?",
        opcoes: ["Luvas térmicas", "Boné", "Relógio"],
        correta: 0
    },
    {
        pergunta: "O que evita cortes ao manipular facas?",
        opcoes: ["Luvas de aço ou proteção", "Tecido comum", "Pano de prato"],
        correta: 0
    },
    {
        pergunta: "Qual é a função do avental na cozinha?",
        opcoes: ["Proteger o corpo contra sujeira e calor", "Apenas estética", "Segurar panelas"],
        correta: 0
    },
    {
        pergunta: "Qual atitude é correta ao usar fogão?",
        opcoes: ["Manter atenção total", "Usar celular ao mesmo tempo", "Deixar desassistido"],
        correta: 0
    },
    {
        pergunta: "Qual EPI protege os pés na cozinha?",
        opcoes: ["Sapato fechado antiderrapante", "Chinelo", "Sandália"],
        correta: 0
    },
    {
        pergunta: "Por que prender o cabelo na cozinha?",
        opcoes: ["Evitar contaminação e acidentes", "Estilo", "Não é necessário"],
        correta: 0
    },
    {
        pergunta: "O que fazer ao derramar óleo no chão?",
        opcoes: ["Limpar imediatamente", "Ignorar", "Cobrir com pano seco e deixar"],
        correta: 0
    },
    {
        pergunta: "Qual risco existe ao não usar EPI?",
        opcoes: ["Acidentes e contaminação", "Mais rapidez", "Nenhum"],
        correta: 0
    },
    {
        pergunta: "Qual é o objetivo da segurança do trabalho?",
        opcoes: ["Prevenir acidentes", "Aumentar velocidade", "Reduzir higiene"],
        correta: 0
    },
    {
        pergunta: "Na cozinha, o que deve ser evitado?",
        opcoes: ["Brincadeiras e distrações", "Organização", "Higiene"],
        correta: 0
    }
];

let atual = 0;

function iniciarJogo() {
    document.getElementById("tela-inicial").style.display = "none";
    document.getElementById("quiz-container").style.display = "block";
    carregarPergunta();
}

function carregarPergunta() {
    let p = perguntas[atual];
    document.getElementById("pergunta").innerText = p.pergunta;

    let opcoesDiv = document.getElementById("opcoes");
    opcoesDiv.innerHTML = "";
    document.getElementById("feedback").innerText = "";
    document.getElementById("btn-proxima").style.display = "none";

    p.opcoes.forEach((opcao, index) => {
        let btn = document.createElement("div");
        btn.classList.add("opcao");
        btn.innerText = opcao;
        btn.onclick = () => verificarResposta(index);
        opcoesDiv.appendChild(btn);
    });
}

function verificarResposta(resposta) {
    let p = perguntas[atual];
    let feedback = document.getElementById("feedback");

    if(resposta === p.correta) {
        feedback.innerHTML = "✔ Vocês acertaram!";
        feedback.className = "certo";
    } else {
        feedback.innerHTML = "✘ Vocês erraram! A resposta correta é: " 
        + p.opcoes[p.correta];
        feedback.className = "errado";
    }

    document.getElementById("btn-proxima").style.display = "block";
}

function proximaPergunta() {
    atual++;

    if(atual < perguntas.length) {
        carregarPergunta();
    } else {
        document.getElementById("quiz-container").innerHTML =
        "<div class='card'><h2>Fim do jogo!</h2><p>Boa! Vocês aprenderam sobre EPIs na gastronomia.</p></div>";
    }
}
</script>

</body>
</html>
